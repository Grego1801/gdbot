name: Build MacroBot

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android64
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroBot-android
          path: build/*.geode
