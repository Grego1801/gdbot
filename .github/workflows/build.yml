name: Build MacroBot

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          combine: true

      - uses: actions/upload-artifact@v4
        with:
          name: MacroBot
          path: build/*.geode
