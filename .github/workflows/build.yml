name: Build MacroBot

on: [push]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode SDK
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android64
          sdk: '3.0.0'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroBot-android64
          path: build/*.geode
