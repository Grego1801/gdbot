name: Build MacroBot

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Geode SDK
        uses: geode-sdk/build-geode-mod@main
        with:
          platform: android64
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroBot-android
          path: build/*.geode
